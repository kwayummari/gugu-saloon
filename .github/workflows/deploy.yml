name: Deploy Backend to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@${{ secrets.DEPLOY_HOST }} \
            "cd /srv/projects/gugu-saloon/backend && git pull origin main && docker compose -f /srv/projects/gugu-saloon/docker-compose.yml build backend && docker compose -f /srv/projects/gugu-saloon/docker-compose.yml up -d && docker compose -f /srv/projects/gugu-saloon/docker-compose.yml ps"
